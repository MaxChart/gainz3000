<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="GAINZ 3000"/>
  <meta name="theme-color" content="#0a0010"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <title>GAINZ MACHINE 3000</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0a0010;overflow-x:hidden}
    body{font-family:'Press Start 2P',monospace;color:#fff}
    @keyframes glitch{0%,100%{text-shadow:-2px 0 #ff2d78,2px 0 #00e5ff}25%{text-shadow:2px 0 #ff2d78,-2px 0 #00e5ff}50%{text-shadow:-2px 2px #b44fff,2px -2px #e8ff3c}75%{text-shadow:2px -2px #ff2d78,-2px 2px #00e5ff}}
    @keyframes grid-scroll{from{background-position:0 0}to{background-position:0 80px}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes slide-in{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes sun-pulse{0%,100%{opacity:.9}50%{opacity:1}}
    @keyframes neon-flicker{0%,19%,21%,23%,25%,54%,56%,100%{opacity:1}20%,24%,55%{opacity:.4}}
    @keyframes rainbow-bar{0%{background-position:0% 50%}100%{background-position:200% 50%}}
    .glitch-text{animation:glitch 3s infinite}
    .neon-flicker{animation:neon-flicker 4s infinite}
    .blink{animation:blink 1s step-end infinite}
    .slide-in{animation:slide-in .3s ease-out}
    .btn-retro{font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;border:2px solid;padding:10px 14px;letter-spacing:1px;transition:all .1s;text-transform:uppercase;position:relative}
    .btn-retro:active{transform:translate(2px,2px)}
    .btn-primary{background:#ff2d78;border-color:#ff2d78;color:#000;box-shadow:4px 4px 0 #7a0033,0 0 20px rgba(255,45,120,.5)}
    .btn-cyan{background:#00e5ff;border-color:#00e5ff;color:#000;box-shadow:4px 4px 0 #006070,0 0 20px rgba(0,229,255,.4)}
    .btn-yellow{background:#e8ff3c;border-color:#e8ff3c;color:#000;box-shadow:4px 4px 0 #606800,0 0 20px rgba(232,255,60,.4)}
    .btn-ghost{background:transparent;border-color:#444;color:#888;box-shadow:2px 2px 0 #222}
    .btn-ghost:hover{border-color:#666;color:#aaa}
    .card-retro{border:2px solid #333;background:rgba(10,0,20,.9);position:relative}
    .card-retro::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,45,120,.03) 0%,transparent 100%);pointer-events:none}
    .input-retro{font-family:'Press Start 2P',monospace;font-size:14px;background:#0a0010;border:2px solid #333;color:#e8ff3c;padding:8px;text-align:center;outline:none}
    .input-retro:focus{border-color:#ff2d78;box-shadow:0 0 10px rgba(255,45,120,.3)}
    .progress-bar-retro{height:12px;background:#111;border:2px solid #333;overflow:hidden}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,#ff2d78,#b44fff,#00e5ff);background-size:200% 100%;animation:rainbow-bar 2s linear infinite;transition:width .5s steps(10)}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#0a0010}
    ::-webkit-scrollbar-thumb{background:#ff2d78}
  </style>
</head>

const PixelChart=({data,color="#ff2d78"})=>{
  if(!data||data.length<2)return<div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:"#444",textAlign:"center",padding:16}}>NO DATA YET<br/>PLAY MORE</div>;
  const vals=data.map(d=>(d.weight||0)*(d.reps||1));
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const W=260,H=60,P=8,PX=4;
  const pts=vals.map((v,i)=>({x:Math.round((P+(i/(vals.length-1))*(W-P*2))/PX)*PX,y:Math.round((H-P-((v-min)/range)*(H-P*2))/PX)*PX}));
  return<svg width={W} height={H} style={{imageRendering:"pixelated"}}>
    {pts.map((p,i)=>i>0&&<line key={i} x1={pts[i-1].x} y1={pts[i-1].y} x2={p.x} y2={p.y} stroke={color} strokeWidth={PX} strokeLinecap="square"/>)}
    {pts.map((p,i)=><rect key={i} x={p.x-PX} y={p.y-PX} width={PX*2} height={PX*2} fill={color}/>)}
    <line x1={P} y1={H-P} x2={W-P} y2={H-P} stroke="#333" strokeWidth={2}/>
  </svg>;
};

const BG=()=>{
  const stars=useRef([...Array(20)].map(()=>({l:Math.random()*100,t:Math.random()*50,s:Math.random()>.7?3:2,d:Math.random()*3,dur:1+Math.random()*3}))).current;

    {stars.map((s,i)=><div key={i} style={{position:"absolute",left:`${s.l}%`,top:`${s.t}%`,width:s.s,height:s.s,background:"#fff",animation:`blink ${s.dur}s step-end infinite`,animationDelay:`${s.d}s`}}/>)}

};

const Scanlines=()=><div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999,background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)"}}/>;

  const total=appData.workoutCount||0,nextIdx=total%4,defaultDay=DAY_ORDER[nextIdx];
  const [selectedDay,setSelectedDay]=useState(defaultDay);
  const day=PROGRAM[selectedDay];
  return<div className="slide-in" style={{padding:"0 16px 100px"}}>
    <div style={{textAlign:"center",padding:"30px 0 20px"}}>
      <div className="glitch-text" style={{fontSize:11,color:"#ff2d78",letterSpacing:2,marginBottom:6}}>GAINZ MACHINE</div>

    <div className="card-retro" style={{padding:12,marginBottom:16,display:"flex",justifyContent:"space-around"}}>

    <div className="card-retro" style={{padding:16,marginBottom:16,borderColor:"#ff2d78",boxShadow:"0 0 20px rgba(255,45,120,.2)"}}>
      <div style={{fontSize:7,color:"#ff2d78",marginBottom:10,letterSpacing:2}}>NEXT MISSION</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>

// ─── EXERCISE COMPLETE CUTSCENE ──────────────────────────
const ExerciseCutscene=({exName,totalLifted,onDone})=>{
  const [frame,setFrame]=useState(0);
  const [countdown,setCountdown]=useState(5);

  useEffect(()=>{
    const fi=setInterval(()=>setFrame(f=>(f+1)%4),200);
    const ci=setInterval(()=>setCountdown(c=>{if(c<=1){onDone();return 0;}return c-1;}),1000);
    return()=>{clearInterval(fi);clearInterval(ci);};
  },[]);

  // Pumping guy animation frames
  const PumpGuy=({f})=>{
    const armY=[3,2,1,2][f];
    const legL=[9,10,9,8][f];
    const legR=[9,8,9,10][f];
    return<svg width="80" height="120" viewBox="0 0 20 30" style={{imageRendering:"pixelated"}}>
      {/* glow */}
      <ellipse cx="10" cy="28" rx="7" ry="2" fill="rgba(255,45,120,0.3)"/>
      {/* legs */}
      <rect x="8" y={legL} width="3" height="6" fill="#ff2d78"/>
      <rect x="12" y={legR} width="3" height="6" fill="#ff2d78"/>
      {/* shoes */}
      <rect x="7" y={legL+5} width="4" height="2" fill="#e8ff3c"/>
      <rect x="11" y={legR+5} width="4" height="2" fill="#e8ff3c"/>
      {/* body */}
      <rect x="7" y="12" width="9" height="8" fill="#00e5ff"/>
      {/* "M" on chest */}
      <rect x="9" y="13" width="1" height="3" fill="#0a0010"/>
      <rect x="11" y="13" width="1" height="3" fill="#0a0010"/>
      <rect x="10" y="14" width="1" height="1" fill="#0a0010"/>
      {/* arms - pumping */}
      <rect x="3" y={armY+8} width="4" height="3" fill="#00e5ff"/>
      <rect x="16" y={armY+8} width="4" height="3" fill="#00e5ff"/>
      {/* fists */}
      <rect x="2" y={armY+7} width="3" height="3" fill="#f4a460"/>
      <rect x="17" y={armY+7} width="3" height="3" fill="#f4a460"/>
      {/* head */}
      <rect x="8" y="5" width="7" height="7" fill="#f4a460"/>
      {/* eyes */}
      <rect x="10" y="7" width="1" height="2" fill="#0a0010"/>
      <rect x="13" y="7" width="1" height="2" fill="#0a0010"/>
      {/* hair */}
      <rect x="8" y="5" width="7" height="2" fill="#2d1b00"/>
      {/* sweat drops */}
      {f%2===0&&<rect x="6" y="6" width="1" height="2" fill="#00e5ff" opacity="0.7"/>}
      {f%2===1&&<rect x="17" y="7" width="1" height="2" fill="#00e5ff" opacity="0.7"/>}
    </svg>;
  };

  const flashColor=["#ff2d78","#b44fff","#00e5ff","#e8ff3c"][frame];

  return<div style={{position:"fixed",inset:0,zIndex:1000,background:"#0a0010",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"40px 24px"}}>
    {/* Flash border */}

// ─── TIMER (persistent, background-aware) ─────────────────
const PersistentTimer=({seconds,timerState,setTimerState,onDone,beepAudio})=>{
  const [display,setDisplay]=useState(seconds);
  const rafRef=useRef(null);

  useEffect(()=>{
    if(!timerState.running) return;
    const tick=()=>{
      const elapsed=(Date.now()-timerState.startedAt)/1000;
      const rem=Math.max(0, timerState.totalSeconds - elapsed);
      setDisplay(Math.ceil(rem));
      if(rem<=0){
        setTimerState(s=>({...s,running:false}));
        if(beepAudio) { try { beepAudio.currentTime=0; beepAudio.play(); } catch {} }
        if(navigator.vibrate) navigator.vibrate([300,100,300]);
        onDone?.();
        return;
      }
      rafRef.current=requestAnimationFrame(tick);
    };
    rafRef.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafRef.current);
  },[timerState.running, timerState.startedAt]);

  // On mount, sync display
  useEffect(()=>{
    if(!timerState.running){
      const elapsed=(Date.now()-timerState.startedAt)/1000;
      const rem=Math.max(0,timerState.totalSeconds-elapsed);
      setDisplay(Math.ceil(rem));
    }
  },[]);

  const start=()=>setTimerState(s=>({...s,running:true,startedAt:Date.now(),totalSeconds:display>0?display:seconds}));
  const pause=()=>{
    const elapsed=(Date.now()-timerState.startedAt)/1000;
    const rem=Math.max(0,timerState.totalSeconds-elapsed);
    setDisplay(Math.ceil(rem));
    setTimerState(s=>({...s,running:false,totalSeconds:Math.ceil(rem)}));
  };
  const reset=()=>{setDisplay(seconds);setTimerState(s=>({...s,running:false,totalSeconds:seconds,startedAt:Date.now()}))};
  const skip=()=>{setTimerState(s=>({...s,running:false}));onDone?.()};

  const pct=Math.max(0,Math.min(100,((timerState.totalSeconds-display)/timerState.totalSeconds)*100));
  const mins=Math.floor(display/60), secs=display%60, done=display<=0;

  return<div className="card-retro" style={{padding:16,margin:"12px 0"}}>
    <div style={{fontSize:7,color:"#b44fff",letterSpacing:2,marginBottom:10}}>// REST TIMER //</div>
    <div style={{display:"flex",alignItems:"center",gap:16}}>
      <div style={{fontSize:28,color:done?"#e8ff3c":"#00e5ff",fontFamily:"'Press Start 2P',monospace",textShadow:done?"0 0 20px #e8ff3c":"0 0 20px #00e5ff",minWidth:80}}>
        {mins}:{secs.toString().padStart(2,"0")}
      </div>
      <div style={{flex:1}}>
        <div className="progress-bar-retro"><div className="progress-bar-fill" style={{width:`${pct}%`}}/></div>
        <div style={{fontSize:7,color:"#444",marginTop:4}}>{timerState.totalSeconds}s TOTAL</div>
      </div>
    </div>
    <div style={{display:"flex",gap:8,marginTop:12}}>
      <button className="btn-retro btn-ghost" onClick={reset} style={{fontSize:7,padding:"6px 10px"}}>RST</button>
      <button className={`btn-retro ${timerState.running?"btn-ghost":"btn-cyan"}`} onClick={timerState.running?pause:start} style={{fontSize:7,flex:1}}>
        {timerState.running?"⏸ PAUSE":done?"✓ DONE":timerState.totalSeconds<seconds?"▶ RESUME":"▶ START"}
      </button>
      <button className="btn-retro btn-ghost" onClick={skip} style={{fontSize:7,padding:"6px 10px"}}>SKP</button>
    </div>
  </div>;
};

const WorkoutScreen=({dayKey,appData,onComplete,onBack,beepAudio})=>{
  const day=PROGRAM[dayKey];
  const [exIdx,setExIdx]=useState(0);
  const [sets,setSets]=useState(()=>day.exercises.map(ex=>{
    const k=`${dayKey}__${ex.id}`,logs=appData.logs?.[k],prev=logs?.length?logs[logs.length-1]:null;
    const repLow=parseInt((ex.repRange||"8").split("-")[0])||8;
    return Array.from({length:ex.sets},()=>({weight:prev?.weight||0,reps:repLow,done:false}));
  }));
  const [showSub,setShowSub]=useState(false);
  const [sessionStart]=useState(()=>Date.now());
  const [elapsed,setElapsed]=useState(0);
  const [timerState,setTimerState]=useState({running:false,startedAt:0,totalSeconds:180});
  const [cutscene,setCutscene]=useState(null); // {exName, totalLifted}
  const [showMission,setShowMission]=useState(false);

  // Session clock
  useEffect(()=>{
    const iv=setInterval(()=>setElapsed(Math.floor((Date.now()-sessionStart)/1000)),1000);
    return()=>clearInterval(iv);
  },[]);

  const ex=day.exercises[exIdx];
  const restSecs=ex.type==="compound"?day.restCompound:day.restAccessory;
  const total=day.exercises.reduce((a,e)=>a+e.sets,0);
  const doneCount=sets.reduce((a,e)=>a+e.filter(s=>s.done).length,0);

  // Rotating notes per set
  const currentSetIdx=sets[exIdx].findIndex(s=>!s.done);
  const notes=EX_NOTES[ex.id]||[ex.notes];
  const currentNote=notes[(currentSetIdx<0?0:currentSetIdx)%notes.length];

  const upd=(ei,si,f,v)=>setSets(p=>{const n=p.map(e=>[...e]);n[ei][si]={...n[ei][si],[f]:v};return n});

  // Auto-fill weight to all undone sets in same exercise
  const updWeight=(ei,si,v)=>setSets(p=>{
    const n=p.map(e=>[...e]);
    n[ei]=n[ei].map((s,i)=>i>=si&&!s.done?{...s,weight:v}:s);
    return n;
  });

  const markDone=(ei,si)=>{
    setSets(p=>{
      const n=p.map(e=>[...e]);
      n[ei][si]={...n[ei][si],done:true};
      // Check if all sets of this exercise are now done
      const allDone=n[ei].every(s=>s.done);
      if(allDone){
        const exDone=day.exercises[ei];
        const totalLifted=n[ei].reduce((acc,s)=>acc+(s.weight||0)*(s.reps||0),0);
        setTimeout(()=>setCutscene({exName:exDone.name,totalLifted}),50);
        setTimeout(()=>{
          if(ei<day.exercises.length-1) setExIdx(ei+1);
        },5200);
      }
      return n;
    });
    setTimerState({running:true,startedAt:Date.now(),totalSeconds:restSecs});
  };

  const addSet=(ei)=>setSets(p=>{
    const n=p.map(e=>[...e]);
    const last=n[ei][n[ei].length-1];
    n[ei].push({weight:last?.weight||0,reps:last?.reps||8,done:false});
    return n;
  });

  const switchExercise=(newEx)=>{
    const newSets=sets.map((s,i)=>{
      if(i!==exIdx)return s;
      return Array.from({length:day.exercises[exIdx].sets},()=>({weight:0,reps:parseInt((newEx.repRange||"8").split("-")[0])||8,done:false}));
    });
    // Patch day exercises temporarily
    day.exercises[exIdx]={...day.exercises[exIdx],...newEx};
    setSets(newSets);
    setShowSub(false);
  };

  const complete=()=>{
    const newLogs={...appData.logs};
    day.exercises.forEach((ex,i)=>{
      const k=`${dayKey}__${ex.id}`,best=sets[i].filter(s=>s.done).sort((a,b)=>b.weight-a.weight)[0];
      if(best){if(!newLogs[k])newLogs[k]=[];newLogs[k].push({date:Date.now(),weight:best.weight,reps:best.reps});if(newLogs[k].length>20)newLogs[k]=newLogs[k].slice(-20);}
    });
    const nd={...appData,logs:newLogs,workoutCount:(appData.workoutCount||0)+1};
    saveData(nd);
    // Show mission complete screen
    const totalSets=sets.reduce((a,e)=>a+e.filter(s=>s.done).length,0);
    const totalReps=sets.reduce((a,e)=>a+e.filter(s=>s.done).reduce((b,s)=>b+(s.reps||0),0),0);
    const totalLifted=sets.reduce((a,e)=>a+e.filter(s=>s.done).reduce((b,s)=>b+(s.weight||0)*(s.reps||0),0),0);
    const totalMins=Math.floor(elapsed/60);
    const totalSecs=(elapsed%60).toString().padStart(2,"0");
    setShowMission({
      sets:totalSets, reps:totalReps, totalLifted,
      mins:totalMins, secs:totalSecs,
      exercises:day.exercises.length,
      workoutCount:(nd.workoutCount||1),
    });
    // Delay home nav
    setTimeout(()=>onComplete(nd), 30000);
  };

  const sessionMins=Math.floor(elapsed/60),sessionSecs=elapsed%60;

        <div style={{fontSize:7,color:"#b44fff"}}>{doneCount}/{total} SETS</div>
      </div>
      <div className="progress-bar-retro"><div className="progress-bar-fill" style={{width:`${(doneCount/total)*100}%`}}/></div>
    </div>

    {/* Exercise tabs */}
    <div style={{display:"flex",overflowX:"auto",marginBottom:12,borderBottom:"2px solid #1a1a1a"}}>
      {day.exercises.map((e,i)=>{const allDone=sets[i].every(s=>s.done);return(
        <button key={i} onClick={()=>setExIdx(i)} style={{background:"transparent",border:"none",padding:"8px 10px",fontSize:7,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Press Start 2P',monospace",color:i===exIdx?"#ff2d78":allDone?"#1a6a1a":"#444",borderBottom:`3px solid ${i===exIdx?"#ff2d78":"transparent"}`}}>{allDone?"✓":`${i+1}`}</button>
      );})}
    </div>

    {/* Current exercise */}
    <div className="card-retro" style={{padding:16,marginBottom:12,borderColor:"#b44fff"}}>
      <div style={{fontSize:7,color:"#b44fff",marginBottom:8}}>EXERCISE {exIdx+1}/{day.exercises.length} • {ex.type.toUpperCase()}</div>
      <div style={{fontSize:11,color:"#fff",marginBottom:6,lineHeight:1.6}}>{ex.name}</div>
      <div style={{fontSize:7,color:"#00e5ff",marginBottom:6}}>TARGET: {ex.repRange} REPS</div>
      <div style={{fontSize:7,color:"#555",lineHeight:1.8,minHeight:16}}>{currentNote}</div>
      {subs.length>0&&<button className="btn-retro btn-ghost" onClick={()=>setShowSub(!showSub)} style={{fontSize:6,padding:"5px 8px",marginTop:10}}>⇄ SWITCH EXERCISE</button>}
    </div>

    {/* Substitution picker */}
    {showSub&&subs.length>0&&<div className="card-retro" style={{padding:12,marginBottom:12,borderColor:"#e8ff3c"}}>
      <div style={{fontSize:7,color:"#e8ff3c",marginBottom:10}}>SUBSTITUTE WITH:</div>
      {subs.map(s=>(
        <button key={s.id} className="btn-retro btn-ghost" onClick={()=>switchExercise(s)} style={{fontSize:7,display:"block",width:"100%",marginBottom:6,textAlign:"left"}}>{s.name}</button>
      ))}
      <button className="btn-retro btn-ghost" onClick={()=>setShowSub(false)} style={{fontSize:6,padding:"5px 8px",marginTop:4}}>✕ CANCEL</button>
    </div>}

    {/* Sets */}
    <div className="card-retro" style={{padding:12,marginBottom:12}}>
      <div style={{fontSize:7,color:"#e8ff3c",marginBottom:10}}>SETS</div>
      <div style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 44px",gap:4,marginBottom:8}}>
        <div style={{fontSize:6,color:"#333"}}>#</div>
        <div style={{fontSize:6,color:"#333",textAlign:"center"}}>WEIGHT lb</div>
        <div style={{fontSize:6,color:"#333",textAlign:"center"}}>REPS</div>
        <div style={{fontSize:6,color:"#333",textAlign:"center"}}>GO</div>
      </div>
      {sets[exIdx].map((s,si)=>(
        <div key={si} style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 44px",gap:4,marginBottom:8,alignItems:"center",opacity:s.done?.4:1,borderLeft:`3px solid ${!s.done&&sets[exIdx].findIndex(x=>!x.done)===si?"#ff2d78":"transparent"}`,paddingLeft:4}}>
          <div style={{fontSize:9,color:s.done?"#1a6a1a":"#444"}}>{s.done?"✓":si+1}</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
            <button className="btn-retro btn-ghost" disabled={s.done} onMouseDown={e=>{e.preventDefault();updWeight(exIdx,si,Math.max(0,(s.weight||0)-5))}} style={{fontSize:10,padding:"4px 5px",opacity:s.done?.3:1}}>-</button>
            <input className="input-retro" type="number" value={s.weight||""} disabled={s.done}
              onFocus={e=>{e.target.select()}}
              onChange={e=>{const v=parseFloat(e.target.value)||0;updWeight(exIdx,si,v)}}
              style={{width:50,fontSize:11}}/>
            <button className="btn-retro btn-ghost" disabled={s.done} onMouseDown={e=>{e.preventDefault();updWeight(exIdx,si,(s.weight||0)+5)}} style={{fontSize:10,padding:"4px 5px",opacity:s.done?.3:1}}>+</button>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
            <button className="btn-retro btn-ghost" disabled={s.done} onMouseDown={e=>{e.preventDefault();upd(exIdx,si,"reps",Math.max(1,(s.reps||1)-1))}} style={{fontSize:10,padding:"4px 5px",opacity:s.done?.3:1}}>-</button>
            <input className="input-retro" type="number" value={s.reps||""} disabled={s.done}
              onFocus={e=>{e.target.select()}}
              onChange={e=>upd(exIdx,si,"reps",parseInt(e.target.value)||1)}
              style={{width:44,fontSize:11}}/>
            <button className="btn-retro btn-ghost" disabled={s.done} onMouseDown={e=>{e.preventDefault();upd(exIdx,si,"reps",(s.reps||1)+1)}} style={{fontSize:10,padding:"4px 5px",opacity:s.done?.3:1}}>+</button>
          </div>
          <button className={`btn-retro ${s.done?"btn-ghost":"btn-primary"}`} disabled={s.done} onClick={()=>markDone(exIdx,si)} style={{fontSize:9,padding:"6px 4px"}}>{s.done?"✓":"GO"}</button>
        </div>
      ))}
      <button className="btn-retro btn-ghost" onClick={()=>addSet(exIdx)} style={{fontSize:6,padding:"6px 10px",marginTop:4,width:"100%"}}>+ ADD SET</button>
    </div>

    {/* Persistent timer */}
    <PersistentTimer
      seconds={restSecs}
      timerState={timerState}
      setTimerState={setTimerState}
      onDone={()=>{}}
      beepAudio={beepAudio}
    />

    {doneCount===total&&<button className="btn-retro btn-yellow" style={{width:"100%",fontSize:10,marginTop:8}} onClick={complete}>🏆 MISSION COMPLETE!</button>}
  </div>
  {cutscene&&<ExerciseCutscene exName={cutscene.exName} totalLifted={cutscene.totalLifted} onDone={()=>setCutscene(null)}/>}
  {showMission&&<MissionComplete stats={showMission} onDone={()=>{setShowMission(false);}}/>};
};


const ProgressScreen=({appData,audio})=>{
  const [sel,setSel]=useState("UPPER-A");
  const day=PROGRAM[sel];
  return<div className="slide-in" style={{padding:"0 16px 100px"}}>
    <div style={{fontSize:10,color:"#00e5ff",padding:"16px 0 14px",textShadow:"0 0 15px #00e5ff"}}>POWER LEVEL STATS</div>
    <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
      {DAY_ORDER.map(d=><button key={d} className={`btn-retro ${sel===d?"btn-cyan":"btn-ghost"}`} style={{fontSize:6,padding:"6px 8px"}} onClick={()=>{setSel(d);audio.click()}}>{PROGRAM[d].label}</button>)}
    </div>
    {day.exercises.map(ex=>{
      const k=`${sel}__${ex.id}`,logs=appData.logs?.[k]||[],last=logs[logs.length-1];
      return<div key={ex.id} className="card-retro" style={{padding:12,marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div style={{fontSize:8,color:"#fff",flex:1,lineHeight:1.6}}>{ex.name}</div>
          {last&&<div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#e8ff3c"}}>{last.weight}lb</div><div style={{fontSize:7,color:"#444"}}>x{last.reps}</div></div>}
        </div>
        <PixelChart data={logs} color={ex.type==="compound"?"#ff2d78":"#00e5ff"}/>
        {!logs.length&&<div style={{fontSize:7,color:"#333",textAlign:"center",padding:8}}><span className="blink">_</span> NO DATA YET</div>}
        {logs.length>0&&<div style={{fontSize:6,color:"#333",marginTop:6}}>{logs.length} SESSION{logs.length>1?"S":""} LOGGED</div>}
      </div>;
    })}
  </div>;
};

const Nav=({active,onNav})=><div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(10,0,20,.97)",borderTop:"2px solid #ff2d78",display:"flex",boxShadow:"0 -4px 20px rgba(255,45,120,.3)"}}>
  {[{id:"home",label:"HOME",icon:"🕹️"},{id:"progress",label:"STATS",icon:"📊"}].map(t=>(
    <button key={t.id} onClick={()=>onNav(t.id)} style={{flex:1,background:"transparent",border:"none",cursor:"pointer",padding:"14px 8px",fontFamily:"'Press Start 2P',monospace",borderTop:`3px solid ${active===t.id?"#ff2d78":"transparent"}`}}>
      <div style={{fontSize:18,marginBottom:4}}>{t.icon}</div>
      <div style={{fontSize:6,color:active===t.id?"#ff2d78":"#444"}}>{t.label}</div>
    </button>
  ))}
</div>;

// ─── MUSIC ENGINE (HTML5 Audio) ──────────────────────────
function createMusicEngine() {
  let audio = null;
  let playing = false;

  const getAudio = () => {
    if (!audio) {
      audio = new Audio("music.mp3");
      audio.loop = true;
      audio.volume = 0.7;
    }
    return audio;
  };

  return {
    async toggle() {
      if (playing) {
        playing = false;
        getAudio().pause();
        return false;
      } else {
        playing = true;
        try {
          getAudio().currentTime = getAudio().currentTime || 0;
          await getAudio().play();
        } catch(e) {
          playing = false;
          return false;
        }
        return true;
      }
    },
    isPlaying: () => playing,
  };
}


function App(){
  const [view,setView]=useState("home");
  const [activeDay,setActiveDay]=useState(null);
  const [appData,setAppData]=useState(loadData);
  const audio=useAudio();
  const musicRef=useRef(null);
  const beepRef=useRef(null);
  const [musicPlaying,setMusicPlaying]=useState(false);
  useEffect(()=>{
    musicRef.current=createMusicEngine();
    beepRef.current=new Audio("beep.mp3");
    beepRef.current.volume=0.8;
  },[]);
  const toggleMusic=async()=>{
    if(!musicRef.current)return;
    const nowPlaying=await musicRef.current.toggle();
    setMusicPlaying(nowPlaying);
  };
  const startWorkout=d=>{setActiveDay(d);setView("workout")};
  const completeWorkout=nd=>{setAppData(nd);setView("home");setActiveDay(null)};
  return<div style={{minHeight:"100vh",position:"relative",maxWidth:480,margin:"0 auto"}}>
    <BG/>
    <Scanlines/>
    <div style={{position:"relative",zIndex:10}}>
      {view==="home"&&<HomeScreen appData={appData} onStart={startWorkout} audio={audio} onToggleMusic={toggleMusic} musicPlaying={musicPlaying}/>}
      {view==="workout"&&activeDay&&<WorkoutScreen dayKey={activeDay} appData={appData} onComplete={completeWorkout} onBack={()=>setView("home")} audio={audio} beepAudio={beepRef.current}/>}
      {view==="progress"&&<ProgressScreen appData={appData} audio={audio}/>}
    </div>
    {view!=="workout"&&<Nav active={view} onNav={setView}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
