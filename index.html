  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0a0010;overflow-x:hidden}
    body{font-family:'Press Start 2P',monospace;color:#fff}
    @keyframes glitch{0%,100%{text-shadow:-2px 0 #ff2d78,2px 0 #00e5ff}25%{text-shadow:2px 0 #ff2d78,-2px 0 #00e5ff}50%{text-shadow:-2px 2px #b44fff,2px -2px #e8ff3c}75%{text-shadow:2px -2px #ff2d78,-2px 2px #00e5ff}}
    @keyframes grid-scroll{from{background-position:0 0}to{background-position:0 80px}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes slide-in{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes sun-pulse{0%,100%{opacity:.9}50%{opacity:1}}
    @keyframes neon-flicker{0%,19%,21%,23%,25%,54%,56%,100%{opacity:1}20%,24%,55%{opacity:.4}}
    @keyframes rainbow-bar{0%{background-position:0% 50%}100%{background-position:200% 50%}}
    .glitch-text{animation:glitch 3s infinite}
    .neon-flicker{animation:neon-flicker 4s infinite}
    .blink{animation:blink 1s step-end infinite}
    .slide-in{animation:slide-in .3s ease-out}
    .btn-retro{font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;border:2px solid;padding:10px 14px;letter-spacing:1px;transition:all .1s;text-transform:uppercase;position:relative}

    .btn-primary{background:#ff2d78;border-color:#ff2d78;color:#000;box-shadow:4px 4px 0 #7a0033,0 0 20px rgba(255,45,120,.5)}
    .btn-cyan{background:#00e5ff;border-color:#00e5ff;color:#000;box-shadow:4px 4px 0 #006070,0 0 20px rgba(0,229,255,.4)}
    .btn-yellow{background:#e8ff3c;border-color:#e8ff3c;color:#000;box-shadow:4px 4px 0 #606800,0 0 20px rgba(232,255,60,.4)}
    .btn-ghost{background:transparent;border-color:#444;color:#888;box-shadow:2px 2px 0 #222}
    .btn-ghost:hover{border-color:#666;color:#aaa}
    .card-retro{border:2px solid #333;background:rgba(10,0,20,.9);position:relative}
    .card-retro::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,45,120,.03) 0%,transparent 100%);pointer-events:none}
    .input-retro{font-family:'Press Start 2P',monospace;font-size:14px;background:#0a0010;border:2px solid #333;color:#e8ff3c;padding:8px;text-align:center;outline:none}
    .input-retro:focus{border-color:#ff2d78;box-shadow:0 0 10px rgba(255,45,120,.3)}
    .progress-bar-retro{height:12px;background:#111;border:2px solid #333;overflow:hidden}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,#ff2d78,#b44fff,#00e5ff);background-size:200% 100%;animation:rainbow-bar 2s linear infinite;transition:width .5s steps(10)}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#0a0010}
    ::-webkit-scrollbar-thumb{background:#ff2d78}
  </style>
</head>

const useAudio=()=>{
  const ref=useRef(null);
  const ctx=()=>{if(!ref.current)ref.current=new(window.AudioContext||window.webkitAudioContext)();return ref.current};
  const note=(f,d,t="square",v=.15)=>{try{const c=ctx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d)}catch{}};
  return{
    success:()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>note(f,.15),i*80)),
    timerDone:()=>[440,554,659,880].forEach((f,i)=>setTimeout(()=>note(f,.2,"square",.2),i*100)),
    startJingle:()=>[262,294,330,392,523,392,440,523].forEach((f,i)=>setTimeout(()=>note(f,.18,"square",.12),i*120)),
    click:()=>note(220,.05,"square",.08),
  };
};

const PixelChart=({data,color="#ff2d78"})=>{
  if(!data||data.length<2)return<div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:"#444",textAlign:"center",padding:16}}>NO DATA YET<br/>PLAY MORE</div>;
  const vals=data.map(d=>(d.weight||0)*(d.reps||1));
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const W=260,H=60,P=8,PX=4;
  const pts=vals.map((v,i)=>({x:Math.round((P+(i/(vals.length-1))*(W-P*2))/PX)*PX,y:Math.round((H-P-((v-min)/range)*(H-P*2))/PX)*PX}));
  return<svg width={W} height={H} style={{imageRendering:"pixelated"}}>
    {pts.map((p,i)=>i>0&&<line key={i} x1={pts[i-1].x} y1={pts[i-1].y} x2={p.x} y2={p.y} stroke={color} strokeWidth={PX} strokeLinecap="square"/>)}
    {pts.map((p,i)=><rect key={i} x={p.x-PX} y={p.y-PX} width={PX*2} height={PX*2} fill={color}/>)}
    <line x1={P} y1={H-P} x2={W-P} y2={H-P} stroke="#333" strokeWidth={2}/>
  </svg>;
};

const Timer=({seconds,onDone,onSkip,audio})=>{
  const [rem,setRem]=useState(seconds);
  const [active,setActive]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{setRem(seconds);setActive(false);clearInterval(ref.current)},[seconds]);
  const start=()=>{audio.click();setActive(true);ref.current=setInterval(()=>setRem(p=>{if(p<=1){clearInterval(ref.current);setActive(false);audio.timerDone();if(navigator.vibrate)navigator.vibrate([200,100,200]);onDone?.();return 0}return p-1}),1000)};
  const pause=()=>{setActive(false);clearInterval(ref.current);audio.click()};
  const reset=()=>{setActive(false);clearInterval(ref.current);setRem(seconds);audio.click()};
  const pct=Math.round(((seconds-rem)/seconds)*10)*10;
  const mins=Math.floor(rem/60),secs=rem%60,done=rem===0;
  return<div className="card-retro" style={{padding:16,margin:"12px 0"}}>
    <div style={{fontSize:7,color:"#b44fff",letterSpacing:2,marginBottom:10}}>// REST TIMER //</div>
    <div style={{display:"flex",alignItems:"center",gap:16}}>
      <div style={{fontSize:28,color:done?"#e8ff3c":"#00e5ff",fontFamily:"'Press Start 2P',monospace",textShadow:done?"0 0 20px #e8ff3c":"0 0 20px #00e5ff",minWidth:80}}>{mins}:{secs.toString().padStart(2,"0")}</div>
      <div style={{flex:1}}>
        <div className="progress-bar-retro"><div className="progress-bar-fill" style={{width:`${pct}%`}}/></div>
        <div style={{fontSize:7,color:"#444",marginTop:4}}>{seconds}s TOTAL</div>
      </div>
    </div>
    <div style={{display:"flex",gap:8,marginTop:12}}>
      <button className="btn-retro btn-ghost" onClick={reset} style={{fontSize:7,padding:"6px 10px"}}>RST</button>
      <button className={`btn-retro ${active?"btn-ghost":"btn-cyan"}`} onClick={active?pause:start} style={{fontSize:7,flex:1}}>{active?"⏸ PAUSE":done?"✓ DONE":rem===seconds?"▶ START":"▶ RESUME"}</button>
      <button className="btn-retro btn-ghost" onClick={()=>{clearInterval(ref.current);audio.click();onSkip?.()}} style={{fontSize:7,padding:"6px 10px"}}>SKP</button>
    </div>
  </div>;
};

  const [showTimer,setShowTimer]=useState(false);
  const [sets,setSets]=useState(()=>day.exercises.map(ex=>{
    const k=`${dayKey}__${ex.id}`,logs=appData.logs?.[k],prev=logs?.length?logs[logs.length-1]:null;
    return Array.from({length:ex.sets},()=>({weight:prev?.weight||0,reps:prev?.reps||8,done:false}));
  }));
  const ex=day.exercises[exIdx];
  const total=day.exercises.reduce((a,e)=>a+e.sets,0);
  const done=sets.reduce((a,e)=>a+e.filter(s=>s.done).length,0);
  const upd=(ei,si,f,v)=>setSets(p=>{const n=p.map(e=>[...e]);n[ei][si]={...n[ei][si],[f]:v};return n});
  const markDone=(ei,si)=>{
    audio.success();upd(ei,si,"done",true);setShowTimer(true);setTimerKey(k=>k+1);
    if(si<day.exercises[ei].sets-1)setSetIdx(si+1);
    else if(ei<day.exercises.length-1)setTimeout(()=>{setExIdx(ei+1);setSetIdx(0)},100);
  };
  const complete=()=>{
    audio.success();
    const newLogs={...appData.logs};
    day.exercises.forEach((ex,i)=>{
      const k=`${dayKey}__${ex.id}`,best=sets[i].filter(s=>s.done).sort((a,b)=>b.weight-a.weight)[0];
      if(best){if(!newLogs[k])newLogs[k]=[];newLogs[k].push({date:Date.now(),weight:best.weight,reps:best.reps});if(newLogs[k].length>20)newLogs[k]=newLogs[k].slice(-20);}
    });
    const nd={...appData,logs:newLogs,workoutCount:(appData.workoutCount||0)+1};
    saveData(nd);onComplete(nd);
  };
  const restSecs=ex.type==="compound"?day.restCompound:day.restAccessory;
  return<div className="slide-in" style={{padding:"0 16px 120px"}}>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 0 12px"}}>
      <button className="btn-retro btn-ghost" onClick={onBack} style={{fontSize:7,padding:"6px 10px"}}>◀</button>
      <div><div style={{fontSize:10,color:"#ff2d78"}}>{day.label} {day.emoji}</div><div style={{fontSize:6,color:"#444",marginTop:2}}>{day.description}</div></div>
    </div>
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
        <div style={{fontSize:7,color:"#b44fff"}}>PROGRESS</div>
        <div style={{fontSize:7,color:"#b44fff"}}>{done}/{total} SETS</div>
      </div>
      <div className="progress-bar-retro"><div className="progress-bar-fill" style={{width:`${(done/total)*100}%`}}/></div>
    </div>
    <div style={{display:"flex",overflowX:"auto",marginBottom:12,borderBottom:"2px solid #1a1a1a"}}>
      {day.exercises.map((e,i)=>{const allDone=sets[i].every(s=>s.done);return(
        <button key={i} onClick={()=>{setExIdx(i);setSetIdx(0);audio.click()}} style={{background:"transparent",border:"none",padding:"8px 10px",fontSize:7,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Press Start 2P',monospace",color:i===exIdx?"#ff2d78":allDone?"#1a6a1a":"#444",borderBottom:`3px solid ${i===exIdx?"#ff2d78":"transparent"}`}}>{allDone?"✓":`${i+1}`}</button>
      );})}
    </div>
    <div className="card-retro" style={{padding:16,marginBottom:12,borderColor:"#b44fff"}}>
      <div style={{fontSize:7,color:"#b44fff",marginBottom:8}}>EXERCISE {exIdx+1}/{day.exercises.length} • {ex.type.toUpperCase()}</div>
      <div style={{fontSize:11,color:"#fff",marginBottom:6,lineHeight:1.6}}>{ex.name}</div>
      <div style={{fontSize:7,color:"#00e5ff",marginBottom:4}}>TARGET: {ex.repRange} REPS</div>
      <div style={{fontSize:7,color:"#444",lineHeight:1.8}}>{ex.notes}</div>
    </div>
    <div className="card-retro" style={{padding:12,marginBottom:12}}>
      <div style={{fontSize:7,color:"#e8ff3c",marginBottom:10}}>SETS</div>
      <div style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 44px",gap:4,marginBottom:8}}>
        <div style={{fontSize:6,color:"#333"}}>#</div>
        <div style={{fontSize:6,color:"#333",textAlign:"center"}}>WEIGHT lb</div>
        <div style={{fontSize:6,color:"#333",textAlign:"center"}}>REPS</div>
        <div style={{fontSize:6,color:"#333",textAlign:"center"}}>GO</div>
      </div>
      {sets[exIdx].map((s,si)=>(
        <div key={si} style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 44px",gap:4,marginBottom:8,alignItems:"center",opacity:s.done?.4:1,borderLeft:`3px solid ${si===setIdx&&!s.done?"#ff2d78":"transparent"}`,paddingLeft:4}}>
          <div style={{fontSize:9,color:s.done?"#1a6a1a":"#444"}}>{s.done?"✓":si+1}</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
            <button className="btn-retro btn-ghost" disabled={s.done} onClick={()=>upd(exIdx,si,"weight",Math.max(0,(s.weight||0)-5))} style={{fontSize:10,padding:"4px 5px",opacity:s.done?.3:1}}>-</button>
            <input className="input-retro" type="number" value={s.weight} disabled={s.done} onChange={e=>upd(exIdx,si,"weight",parseFloat(e.target.value)||0)} style={{width:50,fontSize:11}}/>
            <button className="btn-retro btn-ghost" disabled={s.done} onClick={()=>upd(exIdx,si,"weight",(s.weight||0)+5)} style={{fontSize:10,padding:"4px 5px",opacity:s.done?.3:1}}>+</button>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
            <button className="btn-retro btn-ghost" disabled={s.done} onClick={()=>upd(exIdx,si,"reps",Math.max(1,(s.reps||1)-1))} style={{fontSize:10,padding:"4px 5px",opacity:s.done?.3:1}}>-</button>
            <input className="input-retro" type="number" value={s.reps} disabled={s.done} onChange={e=>upd(exIdx,si,"reps",parseInt(e.target.value)||1)} style={{width:44,fontSize:11}}/>
            <button className="btn-retro btn-ghost" disabled={s.done} onClick={()=>upd(exIdx,si,"reps",(s.reps||1)+1)} style={{fontSize:10,padding:"4px 5px",opacity:s.done?.3:1}}>+</button>
          </div>
          <button className={`btn-retro ${s.done?"btn-ghost":"btn-primary"}`} disabled={s.done} onClick={()=>markDone(exIdx,si)} style={{fontSize:9,padding:"6px 4px"}}>{s.done?"✓":"GO"}</button>
        </div>
      ))}
    </div>
    {showTimer&&<Timer key={timerKey} seconds={restSecs} audio={audio} onDone={()=>{}} onSkip={()=>setShowTimer(false)}/>}
    {done===total&&<button className="btn-retro btn-yellow" style={{width:"100%",fontSize:10,marginTop:8}} onClick={complete}>🏆 MISSION COMPLETE!</button>}
  </div>;
};

// ─── MUSIC ENGINE ─────────────────────────────────────────
function createMusicEngine() {
  let ctx = null;
  let playing = false;
  let loopTimeout = null;

  const getCtx = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  };

  const note = (c, freq, start, dur, type="square", vol=0.1, detune=0) => {
    try {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type; o.frequency.value = freq;
      if (detune) o.detune.value = detune;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(vol, start + 0.008);
      g.gain.exponentialRampToValueAtTime(0.001, start + dur);
      o.start(start); o.stop(start + dur + 0.05);
    } catch {}
  };

  const kick = (c, t) => {
    try {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = "sine";
      o.frequency.setValueAtTime(200, t);
      o.frequency.exponentialRampToValueAtTime(38, t + 0.12);
      g.gain.setValueAtTime(0.6, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
      o.start(t); o.stop(t + 0.2);
    } catch {}
  };

  const snare = (c, t) => {
    try {
      const buf = c.createBuffer(1, c.sampleRate * 0.12, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++)
        d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.5);
      const src = c.createBufferSource(), filt = c.createBiquadFilter(), g = c.createGain();
      filt.type = "bandpass"; filt.frequency.value = 3000; filt.Q.value = 0.7;
      src.buffer = buf; src.connect(filt); filt.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(0.38, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      src.start(t); src.stop(t + 0.14);
    } catch {}
  };

  const hihat = (c, t, vol=0.07) => {
    try {
      const buf = c.createBuffer(1, c.sampleRate * 0.03, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++)
        d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 4);
      const src = c.createBufferSource(), filt = c.createBiquadFilter(), g = c.createGain();
      filt.type = "highpass"; filt.frequency.value = 10000;
      src.buffer = buf; src.connect(filt); filt.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(vol, t);
      src.start(t); src.stop(t + 0.04);
    } catch {}
  };

  // 138 BPM - Eurodance, 2 Unlimited DNA
  // Key of F minor - dark but pumping, exactly that vibe
  // F3=175 G3=196 Ab3=208 Bb3=233 C4=262 Db4=277 Eb4=311 F4=349 G4=392 Ab4=415 Bb4=466 C5=523 F5=698
  const BPM = 138;
  const B = 60 / BPM;

  const scheduleLoop = (t0) => {
    const c = getCtx();

    // ── ICONIC HORN RIFF - the "da da DA da da" energy ──
    // Short punchy stabs, very 2 Unlimited
    const horn = [
      // Main riff - 4 bars, repeats
      [523,0,0.3],  [523,0.5,0.3],  [622,1,0.5],
      [523,2,0.3],  [523,2.5,0.3],  [466,3,0.3],  [523,3.5,0.3],

      [523,4,0.3],  [523,4.5,0.3],  [622,5,0.5],
      [523,6,0.3],  [622,6.5,0.3],  [698,7,0.8],

      // Second section - builds
      [523,8,0.3],  [523,8.5,0.3],  [622,9,0.5],
      [523,10,0.3], [523,10.5,0.3], [466,11,0.3], [523,11.5,0.3],

      // Peak
      [698,12,0.4], [622,12.5,0.4], [523,13,0.4], [466,13.5,0.4],
      [415,14,0.4], [466,14.5,0.4], [523,15,0.8],
    ];

    horn.forEach(([freq, beat, dur]) => {
      const t = t0 + beat * B;
      // Thick brass sound: sawtooth + detune for width
      note(c, freq, t, dur*B*0.85, "sawtooth", 0.08);
      note(c, freq, t, dur*B*0.85, "sawtooth", 0.05, 15);
      note(c, freq, t, dur*B*0.85, "sawtooth", 0.05, -15);
      // Square overtone for bite
      note(c, freq*2, t, dur*B*0.6, "square", 0.025);
    });

    // ── BASS - the pumping synth bass, very eurodance ──
    // Repeating pattern, punchy
    const bassPattern = [
      [175,0,0.4],[175,0.5,0.2],[175,0.75,0.2],
      [175,1,0.4],[196,1.5,0.3],[175,1.75,0.2],
      [175,2,0.4],[175,2.5,0.2],[175,2.75,0.2],
      [175,3,0.4],[208,3.5,0.3],[196,3.75,0.2],
    ];
    // Play bass pattern twice per loop
    for (let rep = 0; rep < 4; rep++) {
      bassPattern.forEach(([freq, beat, dur]) => {
        const t = t0 + (rep * 4 + beat) * B;
        note(c, freq, t, dur*B*0.8, "triangle", 0.25);
        note(c, freq, t, dur*B*0.4, "sawtooth", 0.08); // attack click
      });
    }

    // ── PAD CHORDS - background atmosphere ──
    const pads = [
      [[175,208,262], 0, 3.9],
      [[196,233,311], 4, 3.9],
      [[175,208,262], 8, 3.9],
      [[208,262,311], 12, 3.9],
    ];
    pads.forEach(([freqs, beat, dur]) => {
      const t = t0 + beat * B;
      freqs.forEach(f => note(c, f, t, dur*B*0.95, "sawtooth", 0.018));
    });

    // ── DRUMS - four on floor, eurodance ──
    const totalBeats = 16;
    for (let i = 0; i < totalBeats; i++) {
      const t = t0 + i * B;
      kick(c, t);                    // 4-on-the-floor
      if (i % 2 === 1) snare(c, t); // snare 2 & 4
      hihat(c, t);                   // 8th hihats
      hihat(c, t + B*0.5, 0.05);
    }
    // Offbeat kicks (the pump)
    [0.5,1.5,2.5,3.5,4.5,5.5,6.5,7.5,8.5,9.5,10.5,11.5,12.5,13.5,14.5,15.5].forEach(b => {
      kick(c, t0 + b * B);
    });

    const loopDur = totalBeats * B * 1000;
    loopTimeout = setTimeout(() => {
      if (playing) scheduleLoop(t0 + totalBeats * B);
    }, loopDur - 150);
  };

  return {
    toggle() {
      if (playing) {
        playing = false;
        clearTimeout(loopTimeout);
        return false;
      } else {
        playing = true;
        const c = getCtx();
        if (c.state === "suspended") c.resume();
        scheduleLoop(c.currentTime + 0.05);
        return true;
      }
    },
    isPlaying: () => playing,
  };
}


function App(){
  const [view,setView]=useState("home");
  const [activeDay,setActiveDay]=useState(null);
  const [appData,setAppData]=useState(loadData);
  const audio=useAudio();
  const musicRef=useRef(null);
  const [musicPlaying,setMusicPlaying]=useState(false);
  useEffect(()=>{ musicRef.current=createMusicEngine(); },[]);
  const toggleMusic=()=>{
    if(!musicRef.current)return;
    const nowPlaying=musicRef.current.toggle();
    setMusicPlaying(nowPlaying);
  };
  const startWorkout=d=>{setActiveDay(d);setView("workout")};
  const completeWorkout=nd=>{setAppData(nd);setView("home");setActiveDay(null)};
  return<div style={{minHeight:"100vh",position:"relative",maxWidth:480,margin:"0 auto"}}>
    <BG/>
    <Scanlines/>
    <div style={{position:"relative",zIndex:10}}>
      {view==="home"&&<HomeScreen appData={appData} onStart={startWorkout} audio={audio} onToggleMusic={toggleMusic} musicPlaying={musicPlaying}/>}
      {view==="workout"&&activeDay&&<WorkoutScreen dayKey={activeDay} appData={appData} onComplete={completeWorkout} onBack={()=>setView("home")} audio={audio}/>}
      {view==="progress"&&<ProgressScreen appData={appData} audio={audio}/>}
    </div>
    {view!=="workout"&&<Nav active={view} onNav={setView}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
